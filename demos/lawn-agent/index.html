<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lawn Agent — Live Scan Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#05080a;
  font-family:'Inter',sans-serif;
  color:#e6f1ea;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.stage{
  width:100%;
  max-width:1040px;
  aspect-ratio:16/9;
  background:#070b0d;
  border:1px solid #17231e;
  border-radius:12px;
  overflow:hidden;
  display:grid;
  grid-template-columns:340px 1fr;
  box-shadow:0 40px 100px rgba(0,0,0,.6);
  position:relative;
}

/* ===== TOP BAR ===== */
.topbar{
  position:absolute;top:0;left:0;right:0;height:34px;
  background:#0a0f11;border-bottom:1px solid #17231e;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;font-family:'JetBrains Mono',monospace;font-size:11px;
  color:#5b7a6c;z-index:10;letter-spacing:.5px;
}
.topbar .brand{color:#3ddc84;font-weight:700}
.topbar .tabs{display:flex;gap:18px}
.topbar .tabs span{cursor:default}
.topbar .tabs span.active{color:#3ddc84}
.topbar .status{display:flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;background:#3ddc84;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ===== LEFT: TERMINAL ===== */
.terminal{
  background:#070b0d;
  padding:44px 14px 14px;
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  line-height:1.65;
  overflow:hidden;
  position:relative;
  border-right:1px solid #17231e;
}
.prompt-line{color:#3ddc84;margin-bottom:10px;font-size:10px;opacity:.8}
.log{color:#8fa39a;white-space:pre-wrap}
.log .lvl{display:inline-block;width:44px;font-weight:700}
.lvl.info{color:#4a9eff}
.lvl.ok{color:#3ddc84}
.lvl.warn{color:#e0a336}
.lvl.d{color:#5b7a6c}
.log .ts{color:#3a4e46;margin-right:6px}
.log .txt{color:#c7d6cd}

.stats{
  position:absolute;bottom:14px;left:14px;right:14px;
  display:flex;gap:18px;font-family:'JetBrains Mono',monospace;
  border-top:1px solid #17231e;padding-top:10px;
}
.stats .stat{font-size:9.5px;color:#5b7a6c}
.stats .stat b{display:block;font-size:16px;color:#e6f1ea;font-weight:700}
.stats .stat.flag b{color:#e0a336}
.stats .stat.card b{color:#3ddc84}

/* ===== RIGHT: PHOTO PANEL ===== */
.photo{
  position:relative;
  background:#000;
  padding-top:34px;
  overflow:hidden;
}
.photo img{
  width:100%;height:100%;object-fit:cover;
  position:absolute;top:34px;left:0;right:0;bottom:0;
  opacity:0;
  transition:opacity 1.2s ease;
}
.photo img.show{opacity:1}

.loc-pill{
  position:absolute;top:46px;left:14px;z-index:5;
  background:rgba(5,10,8,.7);backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.12);
  border-radius:20px;padding:6px 14px;
  font-size:11.5px;color:#e6f1ea;font-weight:500;
  display:flex;align-items:center;gap:6px;
}
.loc-pill::before{content:"📍";font-size:11px}

.postcard-overlay{
  position:absolute;left:14px;bottom:46px;z-index:5;
  background:rgba(6,12,10,.88);backdrop-filter:blur(10px);
  border:1px solid rgba(61,220,132,.35);
  border-radius:10px;padding:12px 16px;
  display:flex;align-items:center;gap:12px;
  max-width:78%;
  opacity:0;transform:translateY(10px);
  transition:all .8s ease;
}
.postcard-overlay.show{opacity:1;transform:translateY(0)}
.postcard-overlay .msg{font-size:13px;font-weight:600;color:#e6f1ea;line-height:1.3}
.postcard-overlay .qr{
  width:38px;height:38px;background:#fff;border-radius:4px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:9px;color:#000;
}

.footer-bar{
  position:absolute;bottom:0;left:0;right:0;height:46px;
  background:rgba(6,10,9,.85);backdrop-filter:blur(8px);
  border-top:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;font-size:11px;color:#8fa39a;
}
.footer-bar .addr{color:#e6f1ea;font-weight:600}
.footer-bar .diag{font-family:'JetBrains Mono',monospace;font-size:10px;color:#e0a336}

.rec{
  position:absolute;bottom:56px;left:16px;z-index:6;
  display:flex;align-items:center;gap:6px;
  font-family:'JetBrains Mono',monospace;font-size:11px;color:#e6f1ea;
}
.rec .reddot{width:7px;height:7px;border-radius:50%;background:#e5484d;animation:pulse 1s infinite}

@media (max-width:720px){
  .stage{grid-template-columns:1fr;aspect-ratio:9/16}
  .terminal{display:none}
  .photo{padding-top:34px}
}
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="topbar">
    <span class="brand">lawn-agent</span>
    <div class="tabs">
      <span>Scan</span>
      <span>Flagged</span>
      <span class="active">Postcards</span>
      <span>Leads</span>
    </div>
    <div class="status"><span class="dot"></span> LIVE SCAN</div>
  </div>

  <div class="terminal">
    <div class="prompt-line">agent@lawn-agent:~% scan --metro chandler-az --imagery satellite+streetview</div>
    <div class="log" id="log"></div>
    <div class="stats">
      <div class="stat"><b id="statParcel">0</b>PARCEL</div>
      <div class="stat flag"><b id="statFlag">0</b>FLAGGED</div>
      <div class="stat card"><b id="statCard">0</b>POSTCARD</div>
    </div>
  </div>

  <div class="photo">
    <div class="loc-pill">703 W Frye Rd &middot; Chandler, AZ</div>
    <img id="beforeImg" class="show" src="../../assets/lawn-before.jpg" alt="Before">
    <img id="afterImg" src="../../assets/lawn-after.png" alt="After">

    <div class="rec"><span class="reddot"></span> 0:0<span id="timer">1</span></div>

    <div class="postcard-overlay" id="postcardOverlay">
      <div class="msg">Here's your front lawn,<br>brought back to life.</div>
      <div class="qr">QR</div>
    </div>

    <div class="footer-bar">
      <span class="addr" id="footerAddr">703 W Frye Rd, Chandler AZ 85225</span>
      <span class="diag" id="footerDiag">front lawn dried out and brown</span>
    </div>
  </div>
</div>

<script>
const lines = [
  { t: 0.0,  lvl:'INFO', txt:'geoapify · fetch places · rect=chandler-az · limit=50' },
  { t: 0.4,  lvl:'INFO', txt:'703 W Frye Rd, Chandler AZ 85225 · 3bd/2ba' },
  { t: 0.8,  lvl:'D',    txt:'satellite pull · mapbox static v9 · z19' },
  { t: 1.1,  lvl:'INFO', txt:'vision · classify lawn condition + house tier' },
  { t: 1.5,  lvl:'D',    txt:'lawnCondition=dead · confidence=0.94 · tier=B' },
  { t: 1.9,  lvl:'OK',   txt:'flagged · front lawn dried out and brown' },
  { t: 2.3,  lvl:'WARN', txt:'owner lookup · owner of record · maricopa co.' },
  { t: 2.7,  lvl:'INFO', txt:'street view · bearing calc · heading=142°' },
  { t: 3.1,  lvl:'INFO', txt:'gemini-3-pro-image · lock=house,drive,trees,sky' },
  { t: 3.5,  lvl:'D',    txt:'render · dirt/gravel → lush even green' },
  { t: 3.9,  lvl:'D',    txt:'render pass 12/40 · turf mask filled' },
  { t: 4.2,  lvl:'D',    txt:'render pass 27/40 · turf mask filled' },
  { t: 4.5,  lvl:'D',    txt:'render pass 40/40 · turf mask filled' },
  { t: 5.0,  lvl:'OK',   txt:'after frame composited · lawn restored' },
  { t: 5.3,  lvl:'INFO', txt:'postcard · front render + QR → landing page' },
  { t: 5.7,  lvl:'OK',   txt:'mail queued · brought back to life' },
];

const log = document.getElementById('log');
const beforeImg = document.getElementById('beforeImg');
const afterImg = document.getElementById('afterImg');
const overlay = document.getElementById('postcardOverlay');
const statParcel = document.getElementById('statParcel');
const statFlag = document.getElementById('statFlag');
const statCard = document.getElementById('statCard');
const footerDiag = document.getElementById('footerDiag');
const timer = document.getElementById('timer');

function play(){
  log.innerHTML = '';
  beforeImg.classList.add('show');
  afterImg.classList.remove('show');
  overlay.classList.remove('show');
  statParcel.textContent='0'; statFlag.textContent='0'; statCard.textContent='0';
  footerDiag.textContent='scanning…';

  lines.forEach(line => {
    setTimeout(() => {
      const row = document.createElement('div');
      const lvlClass = line.lvl.toLowerCase();
      row.innerHTML = `<span class="ts">${line.t.toFixed(3)}</span><span class="lvl ${lvlClass}">${line.lvl}</span><span class="txt">${line.txt}</span>`;
      log.appendChild(row);
      log.scrollTop = log.scrollHeight;

      if (line.txt.includes('geoapify')) statParcel.textContent = '1';
      if (line.txt.includes('flagged')) { statFlag.textContent = '1'; footerDiag.textContent = 'front lawn dried out and brown'; }
      if (line.txt.includes('after frame composited')) { afterImg.classList.add('show'); }
      if (line.txt.includes('mail queued')) { statCard.textContent = '1'; overlay.classList.add('show'); }
    }, line.t * 1000);
  });

  let sec = 1;
  const timerInt = setInterval(() => {
    sec++;
    timer.textContent = sec;
    if (sec >= 9) { clearInterval(timerInt); }
  }, 1000);
}

play();
</script>

</body>
</html>
